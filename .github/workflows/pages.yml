name: Deploy PWA (GitHub Pages)

# Publica la demo PWA de Nimbo en GitHub Pages.
# Se dispara al hacer push a main (al mergear el release) o manualmente.
# Requisito una sola vez: Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; no cancela el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (base-href /project-mobile-ionic/)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (producción, base-href de Pages)
        run: pnpm exec ng build --configuration production --base-href /project-mobile-ionic/

      - name: SPA fallback + .nojekyll
        run: |
          cp www/index.html www/404.html
          touch www/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
