name: Build Android (APK)

# Build nativo Android sin Android Studio (cmdline-tools + Gradle en CI).
# Manual: Actions → "Build Android (APK)" → Run workflow. Genera un APK debug
# descargable como artifact.
on:
  workflow_dispatch:

jobs:
  android:
    name: Capacitor · Gradle assembleDebug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d android ]; then npx cap add android; fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Gradle assembleDebug
        run: cd android && chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nimbo-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
