<ion-content [fullscreen]="true">
  <div class="success-wrap">
    <div class="success-logo">
      <ion-icon name="checkmark-outline" />
    </div>
    <div class="success-text">
      <h1>¡Listo!</h1>
      <p>Tu transferencia fue enviada con éxito.</p>
    </div>
    <div class="spei-chip">
      <ion-icon name="time-outline" />
      <span>SPEI · llega en segundos</span>
    </div>
    <ion-button expand="block" (click)="goHome()">Volver al inicio</ion-button>
  </div>
</ion-content>
