<ion-header>
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Cabecera -->
  <ion-card class="profile-header">
    <ion-card-content>
      <div class="avatar">{{ data.user().avatarInitials }}</div>
      <div class="user-info">
        <div class="user-name">{{ data.user().name }}</div>
        <div class="user-email">{{ data.user().email }}</div>
      </div>
      @if (data.user().verified) {
        <ion-chip color="success" class="verified-chip">
          <ion-icon name="checkmark-circle" />
          <ion-label>Verificada</ion-label>
        </ion-chip>
      }
    </ion-card-content>
  </ion-card>

  <!-- Cuenta -->
  <ion-list lines="inset">
    <ion-list-header>Cuenta</ion-list-header>
    <ion-item button detail>
      <ion-icon name="person" slot="start" class="list-icon" />
      <ion-label>Datos personales</ion-label>
    </ion-item>
    <ion-item button detail>
      <ion-icon name="business" slot="start" class="list-icon" />
      <ion-label>Mis cuentas y CLABE</ion-label>
    </ion-item>
    <ion-item button detail>
      <ion-icon name="shield-checkmark" slot="start" class="list-icon" />
      <ion-label>Seguridad y biometría</ion-label>
    </ion-item>
  </ion-list>

  <!-- Preferencias -->
  <ion-list lines="inset">
    <ion-list-header>Preferencias</ion-list-header>
    <ion-item>
      <ion-icon name="moon" slot="start" class="list-icon" />
      <ion-label>Modo oscuro</ion-label>
      <ion-toggle [checked]="theme.isDark()" (ionChange)="toggleTheme($event.detail.checked)" slot="end" />
    </ion-item>
    <ion-item button detail>
      <ion-icon name="notifications" slot="start" class="list-icon" />
      <ion-label>Notificaciones</ion-label>
    </ion-item>
    <ion-item button detail>
      <ion-icon name="globe" slot="start" class="list-icon" />
      <ion-label>Idioma</ion-label>
      <ion-note slot="end">Español</ion-note>
    </ion-item>
    <ion-item button detail>
      <ion-icon name="help-circle" slot="start" class="list-icon" />
      <ion-label>Ayuda y soporte</ion-label>
    </ion-item>
  </ion-list>

  <div class="logout-wrap">
    <ion-button expand="block" fill="clear" color="danger" (click)="logout()">
      <ion-icon name="log-out" slot="start" />
      Cerrar sesión
    </ion-button>
    <span class="version">Nimbo v0.0.1</span>
  </div>
</ion-content>
