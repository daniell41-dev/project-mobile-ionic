<ion-content [fullscreen]="true">
  <div class="onb-wrap">
    <div class="hero">
      <div class="logo">
        <ion-icon name="wallet" />
      </div>
      <h1>Tu dinero,<br />con claridad.</h1>
      <p>Banca personal sin comisiones ocultas.<br />Envía, paga y ahorra desde un solo lugar.</p>
      <div class="dots">
        <i class="on"></i><i></i><i></i>
      </div>
    </div>

    <div class="actions">
      <ion-button expand="block" (click)="goToLogin()">Crear cuenta</ion-button>
      <button class="btn-ghost" (click)="goToLogin()">Ya tengo cuenta</button>
      <p class="legal">Al continuar aceptas los <span>Términos</span> y el <span>Aviso de Privacidad</span>.</p>
    </div>
  </div>
</ion-content>
